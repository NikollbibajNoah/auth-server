<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Reset Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen flex items-center justify-center p-8">
  <div class="w-full max-w-sm space-y-6">
    <h1 class="text-2xl font-bold">Reset Password</h1>
    <div class="space-y-3">
      <input id="new-password" type="password" placeholder="New password"
        class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm" />
      <input id="confirm-password" type="password" placeholder="Confirm password"
        class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm" />
      <button onclick="doReset()"
        class="w-full bg-zinc-100 text-zinc-900 font-semibold text-sm py-2 rounded">
        Reset Password
      </button>
    </div>
    <p id="message" class="text-sm text-zinc-400"></p>
  </div>

  <script>
    const BASE_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:8080'
      : 'https://auth-server-hra8.vercel.app';

    const token = new URLSearchParams(window.location.search).get('token');
    const message = document.getElementById('message');

    if (!token) {
      message.textContent = 'Invalid or missing token.';
      message.className = 'text-sm text-red-400';
    }

    async function doReset() {
      const newPassword = document.getElementById('new-password').value;
      const confirmPassword = document.getElementById('confirm-password').value;

      if (newPassword !== confirmPassword) {
        message.textContent = 'Passwords do not match.';
        message.className = 'text-sm text-red-400';
        return;
      }

      const res = await fetch(`${BASE_URL}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: newPassword, confirmPassword }),
      });

      const data = await res.json();
      if (data.error) {
        message.textContent = data.error;
      } else {
        message.textContent = data.message;
      }

      if (res.ok) {
        message.textContent = 'Password reset successful! You can now log in with your new password.';
      }
      message.className = `text-sm ${res.ok ? 'text-emerald-400' : 'text-red-400'}`;
    }
  </script>
</body>
</html>
