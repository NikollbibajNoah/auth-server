<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Auth Tester</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { font-family: 'JetBrains Mono', monospace; }
    .log-entry { animation: fadeIn 0.2s ease-in; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .tab-active { background: rgb(39 39 42); color: white; }
    .tab-inactive { color: rgb(113 113 122); }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen p-8">

  <div class="max-w-3xl mx-auto space-y-8">

    <!-- Header -->
    <div class="border-b border-zinc-800 pb-6">
      <p class="text-zinc-500 text-xs uppercase tracking-widest mb-1">dev tool</p>
      <h1 class="text-2xl font-bold text-white">Auth Server Tester</h1>
      <div class="flex items-center gap-2 mt-3">
        <div id="status-dot" class="w-2 h-2 rounded-full bg-zinc-600"></div>
        <span id="status-text" class="text-xs text-zinc-500">not logged in</span>
      </div>
    </div>

    <!-- OAuth -->
    <div class="space-y-2">
      <p class="text-xs text-zinc-500 uppercase tracking-widest">OAuth</p>
      <a id="google-login-link" href="#"
        class="flex items-center gap-3 w-full bg-white text-zinc-900 hover:bg-zinc-100 transition px-4 py-3 rounded font-semibold text-sm">
        <div class="size-4"><img src="./assets/google.png" alt="Google" /></div>
        Continue with Google
      </a>
      <a id="github-login-link" href="#"
        class="flex items-center gap-3 w-full bg-white text-zinc-900 hover:bg-zinc-100 transition px-4 py-3 rounded font-semibold text-sm">
        <div class="size-4"><img src="./assets/github.png" alt="Github" /></div>
        Continue with Github
      </a>
    </div>

    <!-- Traditional Auth -->
    <div class="space-y-3">
      <p class="text-xs text-zinc-500 uppercase tracking-widest">Traditional Auth</p>
      <div class="flex gap-1 bg-zinc-900 p-1 rounded border border-zinc-800 w-fit">
        <button id="tab-login" onclick="switchTab('login')" class="tab-active text-xs px-4 py-1.5 rounded transition">Login</button>
        <button id="tab-register" onclick="switchTab('register')" class="tab-inactive text-xs px-4 py-1.5 rounded transition">Register</button>
      </div>

      <div id="form-login" class="bg-zinc-900 border border-zinc-800 rounded p-4 space-y-3">
        <div>
          <label class="text-xs text-zinc-500 block mb-1">Email</label>
          <input id="login-email" type="email" placeholder="you@example.com"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <div>
          <label class="text-xs text-zinc-500 block mb-1">Password</label>
          <input id="login-password" type="password" placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <button onclick="doLogin()"
          class="w-full bg-zinc-100 hover:bg-white text-zinc-900 font-semibold text-sm py-2 rounded transition">
          Login
        </button>
        <div class="text-center mt-2">
          <button onclick="switchTab('forgot')"
            class="text-xs text-zinc-600 hover:text-zinc-400 transition">
            Forgot password?
          </button>
        </div>
      </div>

      <div id="form-register" class="hidden bg-zinc-900 border border-zinc-800 rounded p-4 space-y-3">
        <div>
          <label class="text-xs text-zinc-500 block mb-1">Email</label>
          <input id="reg-email" type="email" placeholder="you@example.com"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <div>
          <label class="text-xs text-zinc-500 block mb-1">Username</label>
          <input id="reg-username" type="text" placeholder="cooluser"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <div>
          <label class="text-xs text-zinc-500 block mb-1">Password</label>
          <input id="reg-password" type="password" placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <div>
          <label class="text-xs text-zinc-500 block mb-1">Confirm Password</label>
          <input id="reg-confirm-password" type="password" placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <button onclick="doRegister()"
          class="w-full bg-zinc-100 hover:bg-white text-zinc-900 font-semibold text-sm py-2 rounded transition">
          Register
        </button>
      </div>
      
      <div id="form-forgot" class="hidden bg-zinc-900 border border-zinc-800 rounded p-4 space-y-3">
        <button onclick="switchTab('login')" class="text-xs text-zinc-500 hover:text-zinc-300 transition">
          ← back to login
        </button>
        <p class="text-xs text-zinc-400">Enter your email and we'll send you a reset link.</p>
        <div>
          <label class="text-xs text-zinc-500 block mb-1">Email</label>
          <input id="forgot-email" type="email" placeholder="you@example.com"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <button onclick="doForgotPassword()"
          class="w-full bg-zinc-100 hover:bg-white text-zinc-900 font-semibold text-sm py-2 rounded transition">
          Send reset link
        </button>
      </div>

      <div id="form-reset" class="hidden bg-zinc-900 border border-zinc-800 rounded p-4 space-y-3">
        <button onclick="switchTab('login')" class="text-xs text-zinc-500 hover:text-zinc-300 transition">
          ← back to login
        </button>
        <p class="text-xs text-zinc-400">Choose a new password for your account.</p>
        <div>
          <label class="text-xs text-zinc-500 block mb-1">New Password</label>
          <input id="reset-password" type="password" placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <div>
          <label class="text-xs text-zinc-500 block mb-1">Confirm New Password</label>
          <input id="reset-confirm-password" type="password" placeholder="••••••••"
            class="w-full bg-zinc-800 border border-zinc-700 rounded px-3 py-2 text-sm text-white placeholder-zinc-600 focus:outline-none focus:border-zinc-500 transition" />
        </div>
        <button onclick="doResetPassword()"
          class="w-full bg-zinc-100 hover:bg-white text-zinc-900 font-semibold text-sm py-2 rounded transition">
          Reset password
        </button>
      </div>
    </div>

    <!-- Actions -->
    <div class="space-y-2">
      <p class="text-xs text-zinc-500 uppercase tracking-widest">Actions</p>
      <div class="grid grid-cols-2 gap-2">

        <button onclick="checkMe()"
          class="bg-zinc-800 hover:bg-zinc-700 transition text-sm px-4 py-3 rounded text-left">
          <span class="text-zinc-400 block text-xs mb-1">GET</span>
          /me
        </button>

        <button onclick="doRefresh()"
          class="bg-zinc-800 hover:bg-zinc-700 transition text-sm px-4 py-3 rounded text-left">
          <span class="text-zinc-400 block text-xs mb-1">POST</span>
          /refresh
        </button>

        <!-- Admin only -->
        <button onclick="getAllUsers()"
          class="bg-zinc-800 hover:bg-zinc-700 border border-zinc-700 hover:border-amber-800 transition text-sm px-4 py-3 rounded text-left">
          <span class="text-amber-500 block text-xs mb-1">GET · admin</span>
          /users
        </button>

        <button onclick="doLogout()"
          class="bg-zinc-800 hover:bg-red-950 hover:border-red-800 border border-transparent transition text-sm px-4 py-3 rounded text-left">
          <span class="text-red-500 block text-xs mb-1">POST</span>
          /logout
        </button>

      </div>
    </div>

    <!-- Response Log -->
    <div class="space-y-2">
      <div class="flex items-center justify-between">
        <p class="text-xs text-zinc-500 uppercase tracking-widest">Response Log</p>
        <button onclick="clearLog()" class="text-xs text-zinc-600 hover:text-zinc-400 transition">clear</button>
      </div>
      <div id="log" class="bg-zinc-900 rounded border border-zinc-800 p-4 min-h-32 space-y-3 font-mono text-xs overflow-y-auto max-h-96">
        <p class="text-zinc-600">Waiting for requests...</p>
      </div>
    </div>

  </div>

  <script>
    const BASE_URL = window.location.hostname === 'localhost'
      ? 'http://localhost:8080'
      : 'https://auth-server-hra8.vercel.app';

    const log = document.getElementById('log');
    const statusDot = document.getElementById('status-dot');
    const statusText = document.getElementById('status-text');

    document.getElementById('google-login-link').href = `${BASE_URL}/auth/google`;
    document.getElementById('github-login-link').href = `${BASE_URL}/auth/github`;

    function switchTab(tab) {
      ['login', 'register', 'forgot', 'reset'].forEach(t => {
        document.getElementById('form-' + t).classList.add('hidden');
      });
      document.getElementById('form-' + tab).classList.remove('hidden');

      document.getElementById('tab-login').className =
        tab === 'login' ? 'tab-active text-xs px-4 py-1.5 rounded transition' : 'tab-inactive text-xs px-4 py-1.5 rounded transition';
      document.getElementById('tab-register').className =
        tab === 'register' ? 'tab-active text-xs px-4 py-1.5 rounded transition' : 'tab-inactive text-xs px-4 py-1.5 rounded transition';
    }

    function setStatus(loggedIn, username, role) {
      if (loggedIn) {
        statusDot.className = 'w-2 h-2 rounded-full bg-emerald-400';
        statusText.textContent = `logged in as ${username} · ${role}`;
        statusText.className = 'text-xs text-emerald-400';
      } else {
        statusDot.className = 'w-2 h-2 rounded-full bg-zinc-600';
        statusText.textContent = 'not logged in';
        statusText.className = 'text-xs text-zinc-500';
      }
    }

    function addLog(method, endpoint, status, data) {
      const placeholder = log.querySelector('p.text-zinc-600');
      if (placeholder) placeholder.remove();

      const isOk = status >= 200 && status < 300;
      const statusColor = isOk ? 'text-emerald-400' : 'text-red-400';
      const methodColor = method === 'GET' ? 'text-blue-400' : 'text-amber-400';

      const entry = document.createElement('div');
      entry.className = 'log-entry border-b border-zinc-800 pb-3 last:border-0';
      entry.innerHTML = `
        <div class="flex items-center gap-2 mb-1">
          <span class="${methodColor}">${method}</span>
          <span class="text-zinc-300">${endpoint}</span>
          <span class="${statusColor} ml-auto">${status}</span>
        </div>
        <pre class="text-zinc-400 whitespace-pre-wrap">${JSON.stringify(data, null, 2)}</pre>
      `;
      log.prepend(entry);
    }

    async function doLogin() {
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const res = await fetch(`${BASE_URL}/login`, {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      addLog('POST', '/login', res.status, data);
      if (res.ok) checkMe();
    }

    async function doRegister() {
      const email = document.getElementById('reg-email').value;
      const username = document.getElementById('reg-username').value;
      const password = document.getElementById('reg-password').value;
      const confirmPassword = document.getElementById('reg-confirm-password').value;
      const res = await fetch(`${BASE_URL}/register`, {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, username, password, confirmPassword }),
      });
      const data = await res.json();
      addLog('POST', '/register', res.status, data);
      if (res.ok) switchTab('login');
    }

    async function doForgotPassword() {
      const email = document.getElementById('forgot-email').value;
      const res = await fetch(`${BASE_URL}/forgot-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email }),
      });
      const data = await res.json();
      addLog('POST', '/forgot-password', res.status, data);
    }

    async function doResetPassword() {
      const params = new URLSearchParams(window.location.search);
      const token = params.get('token');
      const password = document.getElementById('reset-password').value;
      const confirmPassword = document.getElementById('reset-confirm-password').value;

      const res = await fetch(`${BASE_URL}/reset-password`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, newPassword: password }),
      });
      const data = await res.json();
      addLog('POST', '/reset-password', res.status, data);
      if (res.ok) switchTab('login');
    }

    if (new URLSearchParams(window.location.search).get('token')) {
      switchTab('reset');
    }

    async function checkMe() {
      const res = await fetch(`${BASE_URL}/me`, { credentials: 'include' });
      const data = await res.json();
      addLog('GET', '/me', res.status, data);
      if (res.ok) setStatus(true, data.user?.username, data.user?.role);
      else setStatus(false);
    }

    async function getAllUsers() {
      const res = await fetch(`${BASE_URL}/users`, { credentials: 'include' });
      const data = await res.json();
      addLog('GET', '/users', res.status, data);
    }

    async function doRefresh() {
      const res = await fetch(`${BASE_URL}/refresh`, {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({}),
      });
      const data = await res.json();
      addLog('POST', '/refresh', res.status, data);
    }

    async function doLogout() {
      const res = await fetch(`${BASE_URL}/logout`, { method: 'POST', credentials: 'include' });
      const data = await res.json();
      addLog('POST', '/logout', res.status, data);
      if (res.ok) setStatus(false);
    }

    function clearLog() {
      log.innerHTML = '<p class="text-zinc-600">Waiting for requests...</p>';
    }

    checkMe();
  </script>

</body>
</html>
